server:
  port: "${SERVER_PORT:8083}"

spring:
  application:
    name: customer-service

  mongodb:
    uri: "${MONGODB_URI:mongodb://admin:admin123@localhost:27017/customerdb?authSource=admin}"

  data:
    mongodb:
      auto-index-creation: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    dev.igorartsoft.customerservice: DEBUG