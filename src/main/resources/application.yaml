server:
  port: 8083

spring:
  application:
    name: customer-service

  data:
    mongodb:
      uri: mongodb://root:rootpassword@localhost:27017/customerdb?authSource=admin
      auto-index-creation: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    com.igorartsoft.customerservice: DEBUG